<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Dashboard</title>
<script src="lock.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page {
  max-width: 1100px;
  margin: 0 auto;
}

.dash-title {
  margin: 0 0 18px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Bento grid ===== */
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  grid-auto-flow: dense;
  gap: 14px;
}

.tile {
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 18px;
  border-radius: 18px;
  text-decoration: none;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}
.tile:hover {
  transform: translateY(-3px);
  border-color: color-mix(in srgb, var(--accent) 55%, transparent);
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
}

.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

.tile-num {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--text-tertiary);
}
.tile-emoji {
  position: absolute;
  top: 16px; right: 18px;
  font-size: 26px; line-height: 1;
  filter: drop-shadow(0 0 10px var(--accent));
}
.tile-spacer { flex: 1; }
.tile-title {
  font-size: 18px; font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.tile.big .tile-title { font-size: 24px; }

.tile-footer {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
}
.tile-sub {
  font-size: 12px;
  color: var(--text-tertiary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tile-arrow {
  font-size: 16px; font-weight: 700;
  color: var(--accent);
  flex-shrink: 0;
  transition: transform 0.2s ease;
}
.tile:hover .tile-arrow { transform: translateX(4px); }

@media (max-width: 720px) {
  .bento { grid-template-columns: repeat(2, 1fr); }
  .tile.big { grid-row: span 1; }
}
@media (max-width: 440px) {
  .bento { grid-template-columns: 1fr; }
  .tile.big, .tile.wide { grid-column: span 1; }
}
</style>
</head>
<body>
<div class="page">

  <h1 class="dash-title">Dashboard</h1>

  <div class="bento">

    <a class="tile big" style="--accent:#6BE3A4" href="main.html">
      <div class="tile-num">·01</div>
      <div class="tile-emoji">🏠</div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals & daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a class="tile wide" style="--accent:#7DD3FC" href="gym.html">
      <div class="tile-num">·02</div>
      <div class="tile-emoji">💪</div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a class="tile" style="--accent:#A7F3D0" href="health.html">
      <div class="tile-num">·03</div>
      <div class="tile-emoji">💊</div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements & vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a class="tile" style="--accent:#60A5FA" href="po-water.html">
      <div class="tile-num">·04</div>
      <div class="tile-emoji">💧</div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a class="tile wide" style="--accent:#F2C063" href="finance.html">
      <div class="tile-num">·05</div>
      <div class="tile-emoji">📊</div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth & spending</span>

      </div>
    </a>

    <a class="tile wide" style="--accent:#34D399" href="peak.html">
      <div class="tile-num">·06</div>
      <div class="tile-emoji">🔆</div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Peak</div>
      <div class="tile-footer">
        <span class="tile-sub">Daily readiness · energy curve</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a class="tile" style="--accent:#22D3EE" href="meds.html">
      <div class="tile-num">·07</div>
      <div class="tile-emoji">💊</div>
      <div class="tile-spacer"></div>
      <div class="tile-title">Meds</div>
      <div class="tile-footer">
        <span class="tile-sub">Doses · peak & comedown</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>

</div>
</body>
</html>
